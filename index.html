<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Embudo de Ventas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Bienvenido a Mi Embudo de Ventas</h1>
    <p>Captura clientes potenciales de forma profesional 🚀</p>
  </header>

  <main>
    <section class="formulario">
      <h2>Déjanos tus datos</h2>

      <form id="leadForm">
        <input
          type="text"
          id="nombre"
          placeholder="Tu nombre"
          required
        >

        <input
          type="email"
          id="email"
          placeholder="Tu correo electrónico"
          required
        >

        <input
          type="tel"
          id="telefono"
          placeholder="Tu teléfono"
          required
        >

        <button type="submit">
          Quiero más información
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
