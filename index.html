<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embudo Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Embudo de Ventas PRO 🚀</h1>
    <p>Captura y gestiona leads en tiempo real</p>
  </header>

  <main>

    <section>
      <h2>Nuevo Lead</h2>

      <form id="leadForm">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="telefono" placeholder="Teléfono" required>

        <button type="submit">Guardar Lead</button>
      </form>
    </section>

    <hr>

    <section>
      <h2>Leads guardados</h2>

      <button onclick="exportarCSV()">📥 Exportar a Excel</button>

      <div id="leadsList"></div>
    </section>

  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
